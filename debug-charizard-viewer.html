<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Charizard GLB Debug</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #202020;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "/frontend/node_modules/three/build/three.module.js",
        "three/addons/": "/frontend/node_modules/three/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x202020);

    const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 24, 110);

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const key = new THREE.DirectionalLight(0xffffff, 1.4);
    key.position.set(40, 80, 60);
    scene.add(key);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;
    controls.target.set(0, 24, 0);
    controls.update();

    const clock = new THREE.Clock();
    let mixer = null;

    const params = new URLSearchParams(window.location.search);
    const modelPath = params.get('model')
      ?? '/backend/assets/pokemon/glb/0006_charizard/charizard.glb';
    const fixedTime = params.has('time') ? Number(params.get('time')) : null;

    new GLTFLoader().load(
      modelPath,
      (gltf) => {
        const root = gltf.scene;
        scene.add(root);

        const box = new THREE.Box3().setFromObject(root);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxSize = Math.max(size.x, size.y, size.z);
        const distance = maxSize / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2)));

        controls.target.copy(center);
        camera.position.set(center.x, center.y + maxSize * 0.12, center.z + distance * 1.35);
        camera.near = Math.max(0.1, distance / 100);
        camera.far = distance * 10;
        camera.updateProjectionMatrix();
        controls.update();

        if (gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(root);
          const action = mixer.clipAction(gltf.animations[0]).reset().play();
          if (fixedTime !== null && Number.isFinite(fixedTime)) {
            action.paused = true;
            mixer.setTime(fixedTime);
          }
        }
      },
      undefined,
      (error) => {
        console.error(error);
      },
    );

    function tick() {
      requestAnimationFrame(tick);
      if (mixer && fixedTime === null) mixer.update(clock.getDelta());
      controls.update();
      renderer.render(scene, camera);
    }
    tick();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
